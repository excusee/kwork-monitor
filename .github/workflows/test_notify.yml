name: Test notify

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Send test notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo '[{"id":"test002","title":"Карточки маркеров — 6 цветовых гамм + 2 слайда","budget":"до 5 000 ₽","max_budget":"до 15 000 ₽","description":"Нужно создать 6 карточек товаров + 2 информативных слайда. На втором слайде указать артикулы на другие товары. Товар фактически один - это маркеры. 6 карточек - это разные цветовые гаммы маркеров, а наполнение инфографика останется той же самой. Нужно проанализировать других селлеров с похожими товарами и на основе их карточек, сделать лучше.","url":"https://kwork.ru/projects/3205282"}]' | python notify.py
