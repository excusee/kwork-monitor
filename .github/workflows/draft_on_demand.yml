name: Draft on demand

on:
  workflow_dispatch:
    inputs:
      title:
        required: true
      budget:
        required: false
        default: ""
      description:
        required: false
        default: ""
      url:
        required: true
      message_id:
        required: false
        default: ""

permissions:
  contents: read

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          pip install requests
          npm install -g @anthropic-ai/claude-code

      - name: Generate and send draft
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPLY_TO_MESSAGE_ID: ${{ inputs.message_id }}
          ORDER_TITLE: ${{ inputs.title }}
          ORDER_BUDGET: ${{ inputs.budget }}
          ORDER_DESCRIPTION: ${{ inputs.description }}
          ORDER_URL: ${{ inputs.url }}
        run: |
          python -c "
import json, os
card = {
  'id': 'on_demand',
  'title': os.environ['ORDER_TITLE'],
  'budget': os.environ['ORDER_BUDGET'],
  'description': os.environ['ORDER_DESCRIPTION'],
  'url': os.environ['ORDER_URL'],
}
print(json.dumps([card], ensure_ascii=False))
" > on_demand_input.json
          cat on_demand_input.json
          python draft.py < on_demand_input.json > on_demand_drafted.json
          cat on_demand_drafted.json
          python send_draft.py < on_demand_drafted.json
