name: Draft on demand

on:
  workflow_dispatch:
    inputs:
      title:
        required: true
      budget:
        required: false
        default: ""
      description:
        required: false
        default: ""
      url:
        required: true
      message_id:
        required: false
        default: ""

permissions:
  contents: read

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache claude CLI
        id: cache-claude
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: claude-cli-${{ runner.os }}-v1

      - name: Install claude CLI
        if: steps.cache-claude.outputs.cache-hit != 'true'
        run: |
          npm config set prefix ~/.npm-global
          npm install -g @anthropic-ai/claude-code

      - name: Add claude to PATH
        run: |
          npm config set prefix ~/.npm-global
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Install Python deps
        run: pip install requests

      - name: Generate and send draft
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPLY_TO_MESSAGE_ID: ${{ inputs.message_id }}
          ORDER_TITLE: ${{ inputs.title }}
          ORDER_BUDGET: ${{ inputs.budget }}
          ORDER_DESCRIPTION: ${{ inputs.description }}
          ORDER_URL: ${{ inputs.url }}
        run: |
          echo "⏱ $(date +%s%3N) — start"
          python -c "import json,os; print(json.dumps([{'id':'on_demand','title':os.environ['ORDER_TITLE'],'budget':os.environ['ORDER_BUDGET'],'description':os.environ['ORDER_DESCRIPTION'],'url':os.environ['ORDER_URL']}],ensure_ascii=False))" > on_demand_input.json
          echo "⏱ $(date +%s%3N) — running draft.py (claude -p)"
          python draft.py < on_demand_input.json > on_demand_drafted.json
          echo "⏱ $(date +%s%3N) — draft.py done, sending to Telegram"
          python send_draft.py < on_demand_drafted.json
          echo "⏱ $(date +%s%3N) — done"
