name: Kwork Monitor

on:
  # Штатный schedule-триггер GitHub Actions ненадёжен на новых публичных репо
  # (троттлинг до ~1.5-2 часов вместо заданного интервала). Запуск теперь
  # дёргает внешний бесплатный cron-job.org через GitHub REST API
  # (workflow_dispatch), а не встроенный cron.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kwork-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python monitor.py > candidates.json
          python classify.py < candidates.json > classified.json 2>classify_log.txt
          cat classify_log.txt >&2
          python3 -c "
import json, re
from pathlib import Path
log = Path('classify_log.txt').read_text()
failed = re.findall(r'Groq недоступен для (\d+):', log)
if failed:
    seen = json.loads(Path('seen.json').read_text())
    seen = [x for x in seen if x not in failed]
    Path('seen.json').write_text(json.dumps(seen, ensure_ascii=False, indent=2))
    print(f'Убрали из seen.json {len(failed)} ID с ошибкой Groq: {failed}')
"
          python notify.py < classified.json

      - name: Commit updated seen.json
        run: |
          git config user.name "kwork-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json
          git diff --quiet --cached || git commit -m "chore: update seen.json"
          git pull --rebase origin main
          git push
