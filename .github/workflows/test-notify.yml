name: Test Notify (temporary)

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Send test notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import json, subprocess
          card = {
              'id': 'test',
              'title': 'Дизайн контекстного баннера в поиске на WB',
              'budget': 'Желаемый бюджет: до 3 000 ₽',
              'max_budget': 'Допустимый: до 9 000 ₽',
              'description': 'Задача: Разработать креативный рекламный макет контекстного баннера в поиске на WB, который будет привлекать внимание и желание перейти на подборку товаров.\nПродукт : Хлорофилл со спирулиной или инозитол\nОбязательно лого + подпись рядом с лого \"Витамины и БАДы для женского здоровья\"\nТексты (2 варианта):\n1. Витамины и БАДы для похудения\nскидки до -73% \n2. Возьмите аппетит под контроль\nскидки до -73%\nВ отклике прошу указать сроки и стоимость 2 вариантов + ресайзы (см. тех. характеристики во вложении).',
              'url': 'https://kwork.ru/projects/9999999',
              'draft': 'Здравствуйте! Сколько товаров планируется обработать в этом заказе?\n\nДизайном карточек для WB и Ozon занимаюсь регулярно — единый стиль на партию, несложная инфографика. Если материалы уже есть, могу двигаться быстро.\n\nИспользую нейросети там, где это даёт результат лучше и быстрее ручной обработки.\n\nСтанислав',
          }
          json.dump([card], open('/tmp/t.json', 'w'), ensure_ascii=False)
          "
          python notify.py < /tmp/t.json
